<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM IG TOOLS</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(180deg, #0b1021 0%, #1a163a 100%); color: #ffffff; min-height: 100vh; padding-bottom: 90px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .brand { background-color: #000000; color: #eab308; padding: 8px 16px; border-radius: 8px; font-weight: bold; font-size: 18px; border: 1px solid #333; }
        .wallet { background-color: #facc15; color: #000; padding: 8px 16px; border-radius: 20px; font-weight: bold; }
        .view-panel { display: none; padding: 0 15px; }
        .view-panel.active { display: block; }
        .page-title { text-align: center; font-size: 22px; margin: 20px 0; font-weight: 700; }
        .card-list { display: flex; flex-direction: column; gap: 12px; }
        .item-card { background-color: #121212; border: 1px solid #2a2a35; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .item-info { display: flex; align-items: center; gap: 15px; font-size: 17px; font-weight: 600; }
        .price-tag { color: #facc15; font-weight: bold; font-size: 16px; }
        .checkout-box { background-color: #121212; border-radius: 12px; border: 1px solid #2a2a35; padding: 20px; margin-top: 15px; }
        .summary-header { border-left: 4px solid #10b981; padding-left: 12px; margin-bottom: 20px; }
        .input-field { background: #1a1a1f; border: 1px solid #333; width: 100%; padding: 14px; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        .btn-action { background-color: #10b981; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .gateway-container { background-color: #121212; border-radius: 16px; padding: 25px; text-align: center; max-width: 400px; margin: 20px auto; border: 1px solid #2a2a35; }
        .qr-placeholder { background: white; width: 200px; height: 200px; margin: 20px auto; padding: 10px; border-radius: 10px; }
        .qr-placeholder img { width: 100%; height: 100%; }
        .back-btn { background: none; border: none; color: #0ea5e9; font-size: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .timer-text { font-size: 28px; color: #ffeb3b; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">SM IG TOOLS</div>
        <div class="wallet">₹0.00</div>
    </div>

    <div id="main-services" class="view-panel active">
        <div class="page-title">Our Services</div>
        <div class="card-list">
            <div class="item-card" onclick="openSubServices()">
                <div class="item-info"><span>📸</span> Instagram</div>
                <div style="color: #0ea5e9;">›</div>
            </div>
        </div>
    </div>

    <div id="sub-services" class="view-panel">
        <button class="back-btn" onclick="switchView('main-services')">← Back to Menu</button>
        <div class="page-title">Select Quantity</div>
        <div class="card-list" id="dynamic-rates-list"></div>
    </div>

    <div id="add-funds" class="view-panel">
        <button class="back-btn" onclick="switchView('sub-services')">← Change Pack</button>
        <h2>Confirm Order</h2>
        <div class="checkout-box">
            <div class="summary-header">
                <div style="color: #10b981; font-weight: bold; font-size: 14px;">Order Summary ✅</div>
                <div style="font-size: 16px; margin-top: 5px;" id="summary-pack-name">Loading...</div>
                <div style="color: #facc15; font-weight: bold; font-size: 18px; margin-top: 5px;" id="summary-pack-price">₹0.00</div>
            </div>
            <input type="text" class="input-field" placeholder="Paste IG Link" id="target-link">
            <button class="btn-action" onclick="goToGateway()">Submit Order</button>
        </div>
    </div>

    <div id="gateway" class="view-panel">
        <div class="gateway-container">
            <h3>SM IG TOOLS Pay</h3>
            <div class="qr-placeholder"><img id="upi-qr-image" src="" alt="Scan"></div>
            <div style="font-size: 28px; font-weight: bold; margin: 15px 0; color: #10b981;" id="gateway-amount">₹0.00</div>
            <div id="timer" class="timer-text">05:00</div>
            <a href="https://wa.me/917094462812?text=I have completed the payment. Please verify." target="_blank" class="btn-action" style="background-color: #25d366; text-decoration: none; margin-bottom: 10px; display: block;">Payment Completed (Verify on WA)</a>
            <button class="btn-action" style="background-color: #ef4444;" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script>
        const pricingData = { Followers: [{ label: "100 Followers", price: 20 }, { label: "1K Followers", price: 150 }], Views: [{ label: "1K VIEWS", price: 10 }, { label: "10K VIEWS", price: 99 }] };
        let selectedPack = { name: "", price: 0 };
        function switchView(viewId) { document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }
        function openSubServices() { 
            const list = document.getElementById('dynamic-rates-list'); list.innerHTML = "";
            pricingData.Followers.forEach(item => {
                const card = document.createElement('div'); card.className = "item-card";
                card.onclick = () => { selectedPack = item; document.getElementById('summary-pack-name').innerText = item.label; document.getElementById('summary-pack-price').innerText = "₹" + item.price; switchView('add-funds'); };
                card.innerHTML = `<div class="item-info">${item.label}</div><div class="price-tag">₹${item.price}</div>`;
                list.appendChild(card);
            });
            switchView('sub-services');
        }
        function goToGateway() {
            if(!document.getElementById('target-link').value.trim()) return alert("Paste IG Link!");
            document.getElementById('gateway-amount').innerText = "₹" + selectedPack.price;
            document.getElementById('upi-qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=7094462812@okaxis&am=${selectedPack.price}`;
            switchView('gateway');
            startTimer();
        }
        function startTimer() {
            let timeLeft = 300;
            let timerId = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
                document.getElementById("timer").innerText = m + ":" + (s < 10 ? "0" + s : s);
                if (timeLeft <= 0) { clearInterval(timerId); alert("Time Expired!"); }
            }, 1000);
        }
    </script>
</body>
</html>
